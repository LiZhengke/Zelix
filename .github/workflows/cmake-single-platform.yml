name: CI (i486 CMake)

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

env:
  BUILD_DIR: build-i486
  TOOLCHAIN_FILE: cmake/toolchain-i486-flat.cmake

jobs:
  build:
    name: Build i486 kernel
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            cmake \
            ninja-build \
            gcc \
            gcc-multilib \
            libc6-dev-i386 \
            binutils \
            make

      - name: Configure CMake (i486)
        run: |
          cmake -S . -B "$BUILD_DIR" \
            -G Ninja \
            -DCMAKE_TOOLCHAIN_FILE="$TOOLCHAIN_FILE"

      - name: Build
        run: cmake --build "$BUILD_DIR" --clean-first

      - name: Test (if tests exist)
        shell: bash
        run: |
          if [[ -f "$BUILD_DIR/CTestTestfile.cmake" ]]; then
            ctest --test-dir "$BUILD_DIR" --output-on-failure
          else
            echo "No CTest configuration found, skipping tests."
          fi

      - name: Upload kernel artifacts
        uses: actions/upload-artifact@v4
        with:
          name: zelix-i486
          path: |
            build-i486/kernel/Zelix
            build-i486/kernel/Zelix.map
          if-no-files-found: error
